<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#C82C8C" />

    <!-- Primary SEO (per-page values are overridden at runtime by react-helmet-async) -->
    <title>GO Marketplace — Buy. Sell. Connect.</title>
    <meta
      name="description"
      content="GO Marketplace — Buy. Sell. Connect. Your local classifieds marketplace for cars, property, mobiles, electronics, jobs, furniture and more. Post free ads and chat with buyers and sellers near you."
    />
    <meta
      name="keywords"
      content="marketplace, classifieds, buy and sell, used cars, property for sale, mobiles, electronics, jobs, furniture, local ads, OLX alternative"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Hussain Ahmed" />
    <link rel="canonical" href="https://go-marketplace-rouge.vercel.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GO Marketplace" />
    <meta property="og:title" content="GO Marketplace — Buy. Sell. Connect." />
    <meta
      property="og:description"
      content="Your local classifieds marketplace for cars, property, mobiles, electronics, jobs, furniture and more."
    />
    <meta property="og:url" content="https://go-marketplace-rouge.vercel.app/" />
    <meta property="og:image" content="https://go-marketplace-rouge.vercel.app/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GO Marketplace — Buy. Sell. Connect." />
    <meta
      name="twitter:description"
      content="Your local classifieds marketplace for cars, property, mobiles, electronics, jobs, furniture and more."
    />
    <meta name="twitter:image" content="https://go-marketplace-rouge.vercel.app/og-image.png" />

    <!-- Start the TCP/TLS handshake to the API early so first data fetch is faster -->
    <link rel="preconnect" href="https://go-marketplace-production.up.railway.app" crossorigin />
    <!-- Preconnect to Cloudinary so ad images start loading sooner -->
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- Initial splash: pure CSS/HTML, paints before React's JS parses, then
         fades out the moment the app mounts. No JS cost → no PageSpeed penalty. -->
    <style>
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #ffffff;
        opacity: 1;
        transition: opacity 0.45s ease;
      }
      #app-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash .splash-logo {
        font-family: Inter, system-ui, sans-serif;
        font-size: 40px;
        font-weight: 800;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #c82c8c 0%, #8a1d9d 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
      #app-splash .splash-spinner {
        width: 38px;
        height: 38px;
        border-radius: 9999px;
        border: 3px solid #ececf1;
        border-top-color: #c82c8c;
        animation: splash-spin 0.7s linear infinite;
      }
      @keyframes splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash .splash-spinner {
          animation-duration: 1.4s;
        }
      }
    </style>
  </head>
  <body>
    <!-- Splash is a sibling of #root so React's render doesn't wipe it; main.tsx
         fades it out after mount. -->
    <div id="app-splash">
      <span class="splash-logo">GO</span>
      <span class="splash-spinner" role="status" aria-label="Loading"></span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
